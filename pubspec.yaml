name: broadcast_queue_shim_for_ndk
description: >-
  Offline-first wrapper around the ndk package's broadcast use case. Persists
  Nostr events to a local sembast queue and retries until every targeted relay
  has acknowledged delivery.
version: 0.2.0
repository: https://github.com/nogringo/broadcast-queue-shim-for-ndk
issue_tracker: https://github.com/nogringo/broadcast-queue-shim-for-ndk/issues

topics:
  - nostr
  - ndk
  - offline-first
  - queue

environment:
  sdk: ^3.11.5

dependencies:
  ndk: ^0.8.3
  sembast: ^3.8.7

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
